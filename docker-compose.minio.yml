services:
  minio:
    image: minio/minio:latest
    container_name: enjoy-trip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # 로컬 개발용 S3 호환 스토리지. 콘솔: http://localhost:9001
    # 로그인 = AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (.env.local)
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # 웹 콘솔
    volumes:
      - minio_data:/data

volumes:
  minio_data:
