services:

  postgres:
    image: postgres:16
    container_name: enjoy-trip-db
    environment:
      POSTGRES_DB: ${DB_NAME:-enjoy_trip}
      POSTGRES_USER: ${DB_USER:-enjoy_trip_user}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - enjoy-trip-network

  # 이미지(아바타·그룹커버·갤러리·숙소사진) 객체 스토리지는 AWS S3를 사용한다.
  # 자격증명/리전/버킷은 backend/.env의 AWS_* 키로 주입(로컬 MinIO 컨테이너 제거됨).


volumes:
  postgres_data:

networks:
  enjoy-trip-network:
    driver: bridge
