services:

  postgres:
    image: postgres:16
    container_name: teachers-drawer-db
    environment:
      POSTGRES_DB: teachers_drawer
      POSTGRES_USER: drawer_user
      POSTGRES_PASSWORD: drawer_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drawer-network

  minio:
    image: minio/minio
    container_name: teachers-drawer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - drawer-network

volumes:
  postgres_data:
  minio_data:

networks:
  drawer-network:
    driver: bridge