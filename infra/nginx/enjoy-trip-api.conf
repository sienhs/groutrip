# ============================================================
# EnjoyTrip Backend API - Nginx Reverse Proxy
# Backend EC2 위에서 80/443 요청을 받아 내부 Spring Boot(127.0.0.1:8080)로 프록시한다.
#
# 설치 위치 예시:
#   sudo cp infra/nginx/enjoy-trip-api.conf /etc/nginx/sites-available/enjoy-trip-api
#   sudo ln -s /etc/nginx/sites-available/enjoy-trip-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ❗ api.example.com 을 본인 실제 API 서브도메인으로 모두 바꾼다. (예: api.enjoytrip.io)
# ❗ 이 파일은 HTTP(80) 전용이다. HTTPS(443)/리다이렉트/인증서 경로는
#    `sudo certbot --nginx -d api.example.com` 실행 시 Certbot이 자동으로 추가한다.
#    (Certbot이 listen 443 ssl 블록과 80→443 리다이렉트를 이 파일에 직접 써 넣는다.)
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # ↓↓↓ 본인 실제 도메인으로 교체 ↓↓↓
    server_name api.example.com;

    # 업로드 용량: 백엔드 multipart 한도(50MB)와 맞춘다. 0이면 무제한.
    client_max_body_size 50m;

    # ---- SSE(실시간 알림) 전용 ----
    # /api/groups/{groupId}/stream 은 text/event-stream 롱커넥션이라
    # 버퍼링을 끄고 타임아웃을 길게 줘야 이벤트가 즉시 흐르고 끊기지 않는다.
    location ~ ^/api/groups/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering     off;   # SSE 핵심: 버퍼링 끄기
        proxy_cache         off;
        chunked_transfer_encoding off;
        proxy_read_timeout  3600s; # 롱커넥션 유지
        proxy_send_timeout  3600s;
    }

    # ---- 일반 API / OAuth / 정적 응답 ----
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # 프록시 헤더: Spring 의 forward-headers-strategy=framework 가
        # 이 값으로 https://api.example.com 형태의 baseUrl(OAuth redirect 등)을 복원한다.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
