spring:
  application:
    name: enjoy-trip

  datasource:
    url: jdbc:postgresql://localhost:5432/enjoy_trip
    username: enjoy_trip_user
    password: enjoy_trip_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create	
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
    port: 8080
jwt:
  secret: enjoy-trip-jwt-secret-key-must-be-at-least-256-bits-long-enough-for-hmac
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: enjoy-trip-files
cors:
  allowed-origins: http://localhost:5173