spring:
  application:
    name: enjoy-trip

  # 로컬 시크릿(.env, gitignore)을 properties 형식으로 읽는다. 파일이 없어도 기동에는 문제없다.
  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: jdbc:postgresql://localhost:5432/enjoy_trip
    username: enjoy_trip_user
    password: enjoy_trip_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create	
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
    port: 8080
jwt:
  secret: ${JWT_SECRET:enjoy-trip-jwt-secret-key-must-be-at-least-256-bits-long-enough-for-hmac}
  access-token-expiration: ${JWT_ACCESS_EXP:1800000}  # 30분 (요구사항 반영)
  refresh-token-expiration: ${JWT_REFRESH_EXP:604800000}  # 7일

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: enjoy-trip-files
cors:
  allowed-origins: http://localhost:5173

# 외부 인터페이스: 모든 키는 BE 환경 변수/.env에서만 로드하며 절대 FE에 노출하지 않는다.
# EI-01: 장소 검색은 BE 프록시를 통해 Google Places로 호출한다.
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}

# EI-02: 이동 시간/비용 전용 (FR-SCHEDULE). 장소 검색에는 사용하지 않는다.
kakao:
  mobility:
    api-key: ${KAKAO_MOBILITY_API_KEY:}

# EI-03: 관광지 추천 전용 (FR-RECOMMEND, SHOULD).
tourapi:
  service-key: ${TOURAPI_SERVICE_KEY:}