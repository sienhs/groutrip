spring:
  application:
    name: enjoy-trip

  config:
    # backend 디렉터리 또는 저장소 루트에서 실행해도 로컬 .env를 선택적으로 읽는다.
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/enjoy_trip}
    username: ${DB_USER:enjoy_trip_user}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:disabled}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${KAKAO_OAUTH_CLIENT_ID:disabled}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:disabled}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 5m
      cookie:
        http-only: true
        same-site: lax

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXP:1800000} # 30분
  refresh-token-expiration: ${JWT_REFRESH_EXP:604800000} # 7일

auth:
  refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

storage:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET_NAME:enjoy-trip-files}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}

kakao:
  mobility:
    api-key: ${KAKAO_MOBILITY_API_KEY:}

tourapi:
  service-key: ${TOURAPI_SERVICE_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
